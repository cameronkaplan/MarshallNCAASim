<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marshall's Pool · 2026 NCAA</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-bar">
      <div class="app-bar-title">Marshall's Pool · 2026 NCAA</div>
      <div class="app-bar-controls">
        <button class="button-primary" id="simulate-once">Simulate</button>
        <button class="button-secondary" id="run-simulations">Run 10,000</button>
        <div class="seed-group">
          <label for="simulation-seed">Seed</label>
          <input id="simulation-seed" type="number" min="0" step="1" />
          <button class="button-ghost" id="randomize-seed">New Seed</button>
        </div>
        <button class="button-ghost" id="reset-results">Reset Locks</button>
        <button class="button-ghost" id="reset-all">Reset All</button>
      </div>
    </header>

    <div class="winner-banner" id="winner-banner" hidden>
      <span id="winner-banner-text"></span>
    </div>

    <div class="status-bar" id="status-bar"></div>

    <nav class="tab-bar">
      <button class="tab-btn tab-btn--active" data-tab="bracket">Bracket</button>
      <button class="tab-btn" data-tab="leaders">Current Leaders</button>
      <button class="tab-btn" data-tab="outlook">Projections</button>
    </nav>

    <!-- ── Bracket Tab ──────────────────────────────────────── -->
    <div class="tab-panel tab-panel--active" id="tab-bracket">
      <section class="bracket-section">
        <div class="bracket-scroll">
          <div class="bracket" id="bracket-host"></div>
        </div>
      </section>
      <div class="stats-bar" id="stats-bar"></div>
    </div>

    <!-- ── Leaders Tab ─────────────────────────────────────── -->
    <div class="tab-panel" id="tab-leaders">
      <section class="panel leaders-panel">
        <div class="section-heading">
          <h2>Current Leaders</h2>
          <span class="section-note" id="leaders-note"></span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Participant</th>
                <th>Points</th>
                <th>Teams Left</th>
                <th>$ Left</th>
                <th>Gap</th>
                <th>Win %</th>
              </tr>
            </thead>
            <tbody id="leaders-body"></tbody>
          </table>
        </div>
      </section>
    </div>

    <!-- ── Outlook Tab ─────────────────────────────────────── -->
    <div class="tab-panel" id="tab-outlook">
      <section class="panel leaderboard-panel">
        <div class="section-heading">
          <h2>Participant Outlook</h2>
          <div class="heading-actions">
            <button class="button-ghost panel-ghost btn-sm" id="export-summary" disabled>Export Summary CSV</button>
            <button class="button-ghost panel-ghost btn-sm" id="export-scores" disabled>Export Full Scores CSV</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Participant</th>
                <th>Locked Pts</th>
                <th>Avg Final</th>
                <th>Win %</th>
                <th>2nd %</th>
                <th>Top 2 %</th>
                <th>Range</th>
                <th>Teams</th>
              </tr>
            </thead>
            <tbody id="leaderboard-body"></tbody>
          </table>
        </div>
      </section>
    </div>

    <footer class="app-footer">
      <div class="footer-rules" id="footer-rules"></div>
      <div class="footer-meta" id="footer-meta"></div>
    </footer>

    <script src="./app-data.js"></script>
    <script src="./simulator-core.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
